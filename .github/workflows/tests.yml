name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # stdlib only — nothing to install to run the suite
      - name: Run the test suite (warnings are errors)
        run: python -m unittest discover -s tests -v
      - name: Fail on leaked file handles
        run: python -W error::ResourceWarning -m unittest discover -s tests
      - name: Packaging + console-script smoke test
        run: |
          python -m pip install --upgrade pip build
          python -m build
          pip install dist/*.whl
          corpuslens --help
          corpuslens run examples/sample-corpus --adapter claude-code > /tmp/report.md
          grep -q "No absolute calendar date, timezone, or filename left the wall" /tmp/report.md
